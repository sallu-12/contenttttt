services:
  - type: web
    name: bolzaa-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node -r tsx/esm backend/server.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ADMIN_EMAIL
        fromEnv: ADMIN_EMAIL
      - key: EMAIL_PASS
        fromEnv: EMAIL_PASS
      - key: ALLOWED_ORIGINS
        value: https://bolzaa-frontend.onrender.com,https://www.bolzaa.studio
      - key: ALLOWED_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$,^https://.*\.onrender\.com$
    autoDeploy: true

  - type: static_site
    name: bolzaa-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - path: /api/*
        destination: https://bolzaa-backend.onrender.com
      - path: /
        rewrite: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://bolzaa-backend.onrender.com
      - key: VITE_ADMIN_EMAIL
        value: bolzaa277@gmail.com
    autoDeploy: true
